/* ---------- Design Tokens ---------- */
const C = {
  ink: "#f4f1e8", paper: "#0c0c0c", card: "#1a1a1a", line: "#333130",
  accent: "#f5c518", accentSoft: "rgba(245,197,24,0.14)", gold: "#f5c518",
  green: "#3ddc84", red: "#ff4d4d", white: "#f4f1e8", muted: "#8a857c",
};
const serif = "'Anton','Oswald','Arial Narrow',sans-serif";
const sans = "'Newsreader','Georgia',serif";

/* ---------- localStorage ---------- */
function loadState() { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch (e) { return null; } }
function saveState(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) {} }
function clearState() { try { localStorage.removeItem(STORAGE_KEY); } catch (e) {} }

/* Fragen für die aktuelle Sprache aufbereiten */
function localizedQuestions(lang) {
  return QUESTIONS_BI.map(q => ({ nr: q.nr, frage: q[lang].frage, a: q[lang].a, b: q[lang].b }));
}

/* ---------- Bausteine ---------- */
function Shell({ children }) {
  return (
    <div style={{ height: "100%", background: C.paper, color: C.ink, fontFamily: sans,
      backgroundImage: "radial-gradient(circle at 50% 0%, rgba(245,197,24,0.10), transparent 45%),radial-gradient(circle at 90% 95%, rgba(245,197,24,0.05), transparent 45%)" }}>
      <div style={{ maxWidth: 560, margin: "0 auto", padding: "0 18px", height: "100%", display: "flex", flexDirection: "column", overflowY: "auto", WebkitOverflowScrolling: "touch", overscrollBehavior: "contain" }}>
        <div style={{ paddingBottom: 120, display: "flex", flexDirection: "column", flex: 1 }}>{children}</div>
      </div>
    </div>
  );
}

function StepBar({ step, mode, t }) {
  const labels = mode === "guest" ? t.stepsGuest : t.steps;
  const activeIndex = mode === "guest" && step >= 4 ? step - 1 : step;
  return (
    <div style={{ display: "flex", gap: 5, padding: "16px 0 8px", flexWrap: "wrap", position: "sticky", top: 0, zIndex: 10, background: C.paper }}>
      {labels.map((l, i) => (
        <div key={l} style={{ flex: 1, minWidth: 44 }}>
          <div style={{ height: 4, borderRadius: 4, background: i <= activeIndex ? C.accent : C.line, transition: "background .3s" }} />
          <div style={{ fontSize: 10, marginTop: 5, textAlign: "center", letterSpacing: ".02em", textTransform: "uppercase", color: i === activeIndex ? C.accent : C.muted, fontWeight: i === activeIndex ? 700 : 500, lineHeight: 1.15, wordBreak: "break-word", hyphens: "auto" }}>{l}</div>
        </div>
      ))}
    </div>
  );
}

function Btn({ children, onClick, disabled, variant = "primary", style }) {
  const base = { padding: "14px 20px", borderRadius: 12, fontSize: 16, fontWeight: 600, cursor: disabled ? "not-allowed" : "pointer", border: "1px solid transparent", width: "100%", fontFamily: sans, transition: "transform .1s", opacity: disabled ? 0.45 : 1 };
  const variants = { primary: { background: C.accent, color: "#111", boxShadow: "0 6px 22px rgba(245,197,24,.30)" }, ghost: { background: "transparent", color: C.ink, border: `1px solid ${C.line}` } };
  return (
    <button onClick={disabled ? undefined : onClick} style={{ ...base, ...variants[variant], ...style }}
      onMouseDown={e => !disabled && (e.currentTarget.style.transform = "scale(.98)")}
      onMouseUp={e => (e.currentTarget.style.transform = "scale(1)")}
      onMouseLeave={e => (e.currentTarget.style.transform = "scale(1)")}>{children}</button>
  );
}

function H({ children, sub }) {
  return (
    <div style={{ marginBottom: 18 }}>
      <h1 style={{ fontFamily: serif, fontSize: 30, fontWeight: 400, margin: 0, lineHeight: 1.1, letterSpacing: ".01em", textTransform: "uppercase" }}>{children}</h1>
      {sub && <p style={{ color: C.muted, margin: "8px 0 0", fontSize: 15 }}>{sub}</p>}
    </div>
  );
}

const inputStyle = { width: "100%", padding: 14, borderRadius: 12, border: `1px solid ${C.line}`, background: C.card, fontFamily: sans, fontSize: 16, color: C.ink, boxSizing: "border-box" };

/* ---------- Sprachschalter ---------- */

/* ---------- 1 START ---------- */

        </div>
      </div>

/* ---------- 2 UPLOAD ---------- */
function UploadScreen({ onNext, onBack, questions, setQuestions, resetToDefault, mode, t }) {
  const [err, setErr] = useState("");
  const inputRef = useRef();
  const handleFile = (file) => {
    setErr("");
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
        const parsed = rows.map((r, i) => {
          const get = (keys) => { for (const k of Object.keys(r)) { if (keys.some(x => k.toLowerCase().trim() === x)) return r[k]; } return ""; };
          return { nr: get(["nr.", "nr", "nummer", "no.", "no"]) || i + 1, frage: String(get(["frage", "question"]) || "").trim(), a: String(get(["a"]) || "").trim(), b: String(get(["b"]) || "").trim() };
        }).filter(q => q.frage);
        if (!parsed.length) { setErr(t.upload_err_empty); return; }
        setQuestions(parsed);
      } catch (ex) { setErr(t.upload_err_read); }
    };
    reader.readAsArrayBuffer(file);
  };
  return (
    <Shell>
      <StepBar step={1} mode={mode} t={t} />
      <H sub={t.upload_sub}>{t.upload_title}</H>
      <div onClick={() => inputRef.current.click()} onDragOver={e => e.preventDefault()} onDrop={e => { e.preventDefault(); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); }}
        style={{ border: `2px dashed ${C.accent}`, borderRadius: 16, padding: "36px 20px", textAlign: "center", cursor: "pointer", background: C.card }}>
        <div style={{ fontSize: 40 }}>⬆</div>
        <div style={{ fontWeight: 600, marginTop: 8 }}>{t.upload_btn}</div>
        <div style={{ fontSize: 13, color: C.muted, marginTop: 4 }}>{t.upload_hint}</div>
        <input ref={inputRef} type="file" accept=".xlsx,.xls" style={{ display: "none" }} onChange={e => e.target.files[0] && handleFile(e.target.files[0])} />
      </div>
      {err && <div style={{ color: C.red, marginTop: 14, fontSize: 14 }}>{err}</div>}
      <div style={{ marginTop: 18, padding: 16, borderRadius: 12, background: C.card, border: `1px solid ${C.line}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
          <span style={{ fontWeight: 600 }}>{t.upload_loaded}</span>
          <span style={{ fontFamily: serif, fontSize: 26, color: C.accent }}>{questions.length}</span>
        </div>
        <div style={{ fontSize: 13, color: C.muted, marginTop: 4 }}>{t.upload_available}</div>
        <button onClick={resetToDefault} style={{ background: "none", border: `1px solid ${C.line}`, color: C.muted, marginTop: 12, padding: "8px 12px", borderRadius: 8, cursor: "pointer", fontSize: 13, fontFamily: sans }}>{t.upload_reset_default}</button>
      </div>
      <div style={{ marginTop: "auto", paddingTop: 24, display: "flex", gap: 10 }}>
        <Btn variant="ghost" onClick={onBack} style={{ flex: 1 }}>{t.back}</Btn>
        <Btn onClick={onNext} disabled={!questions.length} style={{ flex: 2 }}>{t.next}</Btn>
      </div>
    </Shell>
  );
}

/* ---------- 3 SETUP ---------- */
function SetupScreen({ onNext, onBack, questions, meta, setMeta, selected, setSelected, mode, t }) {
  const toggle = (nr) => setSelected(s => s.includes(nr) ? s.filter(x => x !== nr) : [...s, nr]);
  const allSelected = selected.length === questions.length;
  return (
    <Shell>
      <StepBar step={2} mode={mode} t={t} />
      <H sub={t.setup_sub}>{t.setup_title}</H>
      <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 18 }}>
        {mode !== "guest" && <input value={meta.interview} onChange={e => setMeta({ ...meta, interview: e.target.value })} placeholder={t.setup_name_interviewer} style={inputStyle} />}
        <input value={meta.guest} onChange={e => setMeta({ ...meta, guest: e.target.value })} placeholder={t.setup_name_guest} style={inputStyle} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <span style={{ fontWeight: 600 }}>{t.setup_select} <span style={{ color: C.accent }}>({selected.length})</span></span>
        <button onClick={() => setSelected(allSelected ? [] : questions.map(q => q.nr))} style={{ background: "none", border: "none", color: C.accent, fontWeight: 600, cursor: "pointer", fontSize: 14, fontFamily: sans }}>{allSelected ? t.setup_deselect_all : t.setup_select_all}</button>
      </div>
      <div style={{ border: `1px solid ${C.line}`, borderRadius: 12, overflow: "hidden", background: C.card, maxHeight: "42vh", overflowY: "auto" }}>
        {questions.map((q, i) => {
          const on = selected.includes(q.nr);
          return (
            <label key={q.nr} style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 14px", borderBottom: i < questions.length - 1 ? `1px solid ${C.paper}` : "none", cursor: "pointer", background: on ? C.accentSoft : "transparent" }}>
              <input type="checkbox" checked={on} onChange={() => toggle(q.nr)} style={{ width: 18, height: 18, accentColor: C.accent }} />
              <span style={{ fontSize: 15 }}>{q.frage}</span>
            </label>
          );
        })}
      </div>
      <div style={{ marginTop: "auto", paddingTop: 24, display: "flex", gap: 10 }}>
        <Btn variant="ghost" onClick={onBack} style={{ flex: 1 }}>{t.back}</Btn>
        <Btn onClick={onNext} disabled={!selected.length} style={{ flex: 2 }}>{t.setup_save_next}</Btn>
      </div>
    </Shell>
  );
}

/* ---------- 4/5 ANTWORT ---------- */
function gridRow(isHead) {
  return { display: "grid", gridTemplateColumns: "1fr 52px 52px 46px", alignItems: "center", gap: 6, padding: isHead ? "6px 8px" : "10px 8px", borderBottom: isHead ? `2px solid ${C.line}` : `1px solid ${C.paper}`, borderRadius: isHead ? 0 : 8 };
}
const cellHead = { fontSize: 11, fontWeight: 700, textAlign: "center", color: C.muted, letterSpacing: ".06em", textTransform: "uppercase" };

function Radio({ label, checked, onChange, name, tone = C.accent }) {
  return (
    <label style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, cursor: "pointer", textAlign: "center" }}>
      <span style={{ width: 22, height: 22, borderRadius: "50%", border: `2px solid ${checked ? tone : C.line}`, background: checked ? tone : "transparent", boxShadow: checked ? `0 0 10px ${tone}88` : "none", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all .15s" }}>
        {checked && <span style={{ width: 8, height: 8, borderRadius: "50%", background: C.paper }} />}
      </span>
      {label !== "" && <span style={{ fontSize: 10, lineHeight: 1.05, color: checked ? C.ink : C.muted, maxWidth: 50 }}>{label}</span>}
      <input type="radio" name={name} checked={checked} onChange={onChange} style={{ display: "none" }} />
    </label>
  );
}

function AnswerScreen({ step, who, subject, list, answers, setAnswers, onNext, onBack, mode, t }) {
  const total = list.length;
  const weiterLimit = Math.floor(total * 0.10);
  const weiterCount = list.filter(q => answers[q.nr] === "W").length;
  const weiterPct = total ? Math.round((weiterCount / total) * 100) : 0;
  const overLimit = weiterCount > weiterLimit;
  const choose = (nr, val) => setAnswers(a => ({ ...a, [nr]: val }));
  const done = list.every(q => answers[q.nr]);
  const counterColor = overLimit ? C.red : C.muted;
  return (
    <Shell>
      <StepBar step={step} mode={mode} t={t} />
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
        <H sub={who === "interviewer" ? t.answer_sub_interviewer : t.answer_sub_guest}>
          {who === "interviewer" ? t.answer_interviewer : `${subject || t.col_guest_short} ${t.answer_guest_suffix}`}
        </H>
        <div style={{ flexShrink: 0, textAlign: "right", border: `1px solid ${overLimit ? C.red : C.line}`, borderRadius: 10, padding: "8px 10px", background: C.card, marginTop: 4 }}>
          <div style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: ".04em" }}>{t.weiter_label}</div>
          <div style={{ fontFamily: serif, fontSize: 22, color: counterColor, lineHeight: 1.1 }}>{weiterPct}%</div>
          <div style={{ fontSize: 11, color: counterColor }}>{weiterCount} / {weiterLimit} {t.weiter_allowed}</div>
        </div>
      </div>
      {overLimit && <div style={{ background: "rgba(255,77,77,.12)", border: `1px solid ${C.red}`, color: C.red, borderRadius: 10, padding: "10px 12px", fontSize: 13, marginBottom: 12 }}>{t.weiter_warn(weiterLimit, total, weiterCount)}</div>}
      <div style={gridRow(true)}>
        <div style={{ ...cellHead, textAlign: "left" }}>{t.col_question}</div>
        <div style={cellHead}>A</div><div style={cellHead}>B</div><div style={cellHead}>{t.col_continue}</div>
      </div>
      <div style={{ overflowY: "auto", maxHeight: "52vh", paddingRight: 2 }}>
        {list.map((q) => {
          const v = answers[q.nr];
          return (
            <div key={q.nr} style={{ ...gridRow(false), background: v ? C.card : "transparent" }}>
              <div style={{ fontSize: 14, lineHeight: 1.25, paddingRight: 4 }}><span style={{ color: C.muted, fontSize: 11 }}>{q.nr}. </span>{q.frage}</div>
              <Radio label={q.a} checked={v === "A"} onChange={() => choose(q.nr, "A")} name={`${who}-${q.nr}`} tone={C.green} />
              <Radio label={q.b} checked={v === "B"} onChange={() => choose(q.nr, "B")} name={`${who}-${q.nr}`} tone={C.red} />
              <Radio label="" checked={v === "W"} onChange={() => choose(q.nr, "W")} name={`${who}-${q.nr}`} tone={C.white} />
            </div>
          );
        })}
      </div>
      <div style={{ fontSize: 13, color: C.muted, textAlign: "center", marginTop: 10 }}>{list.filter(q => answers[q.nr]).length} / {list.length} {t.answered}</div>
      <div style={{ marginTop: 16, display: "flex", gap: 10 }}>
        <Btn variant="ghost" onClick={onBack} style={{ flex: 1 }}>{t.back}</Btn>
        <Btn onClick={onNext} disabled={!done} style={{ flex: 2 }}>{t.save_next}</Btn>
      </div>
    </Shell>
  );
}

/* ---------- 6 ABGLEICH ---------- */
function Stat({ label, value }) {
  return (
    <div style={{ flex: 1, background: C.card, border: `1px solid ${C.line}`, borderRadius: 12, padding: "14px 12px", textAlign: "center" }}>
      <div style={{ fontFamily: serif, fontSize: 30, color: C.gold }}>{value}</div>
      <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{label}</div>
    </div>
  );
}

function CompareScreen({ list, meta, aInt, aGuest, onRestart, onBack, onSave, mode, lang, t }) {
  const today = new Date().toISOString().slice(0, 10);
  const [date, setDate] = useState(meta.date || today);
  const [saved, setSaved] = useState(false);
  const guestOnly = mode === "guest";
  const stats = useMemo(() => {
    let match = 0, skipInt = 0, skipGuest = 0; const total = list.length;
    list.forEach(q => { const i = aInt[q.nr], g = aGuest[q.nr]; if (i === "W") skipInt++; if (g === "W") skipGuest++; if (i && g && i === g) match++; });
    const pct = total ? Math.round((match / total) * 100) : 0;
    const guestWeiterPct = total ? Math.round((skipGuest / total) * 100) : 0;
    return { match, total, pct, skipInt, skipGuest, guestWeiterPct };
  }, [list, aInt, aGuest]);
  const lbl = (q, v) => v === "A" ? q.a : v === "B" ? q.b : v === "W" ? t.answer_continue : "—";
  const handleSave = () => { onSave({ ...meta, date }); setSaved(true); };
  const downloadPDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "a4" });
    const margin = 48; const pageW = doc.internal.pageSize.getWidth(); const pageH = doc.internal.pageSize.getHeight(); let y = margin;
    doc.setFont("helvetica", "bold"); doc.setFontSize(20); doc.text("Alles gefragt?", margin, y); y += 26;
    doc.setFontSize(12); doc.setFont("helvetica", "normal");
    if (!guestOnly && meta.interview) { doc.text(`${t.pdf_interviewer}: ${meta.interview}`, margin, y); y += 16; }
    doc.text(`${t.pdf_guest}: ${meta.guest || "—"}`, margin, y); y += 16;
    doc.text(`${t.pdf_date}: ${date}`, margin, y); y += 24;
    doc.setFont("helvetica", "bold"); doc.setFontSize(11); doc.text(t.col_question, margin, y); doc.text(t.pdf_answer, pageW - margin, y, { align: "right" }); y += 6;
    doc.setLineWidth(0.5); doc.line(margin, y, pageW - margin, y); y += 16;
    doc.setFont("helvetica", "normal"); doc.setFontSize(11); const colW = pageW - margin * 2 - 120;
    list.forEach(q => { const ans = lbl(q, aGuest[q.nr]); const lines = doc.splitTextToSize(`${q.nr}. ${q.frage}`, colW); const blockH = lines.length * 14; if (y + blockH > pageH - margin) { doc.addPage(); y = margin; } doc.text(lines, margin, y); doc.text(ans, pageW - margin, y, { align: "right" }); y += blockH + 6; });
    const safe = (s) => (s || "interview").replace(/[^\w\-]+/g, "_");
    doc.save(`AllesGefragt_${safe(meta.guest)}_${date}.pdf`);
  };
  return (
    <Shell>
      <StepBar step={5} mode={mode} t={t} />
      <H sub={meta.interview && !guestOnly ? t.compare_with(meta.interview, meta.guest || t.col_guest_short) : (meta.guest || t.eval_default_sub)}>{guestOnly ? t.eval_title : t.compare_title}</H>
      {guestOnly ? (
        <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 18, padding: "26px 20px", textAlign: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 13, color: C.muted, letterSpacing: ".05em", textTransform: "uppercase" }}>{t.weiter_answers}</div>
          <div style={{ fontFamily: serif, fontSize: 64, fontWeight: 400, color: C.accent, lineHeight: 1 }}>{stats.guestWeiterPct}%</div>
          <div style={{ fontSize: 14, color: C.muted, marginTop: 6 }}>{t.weiter_answers_detail(stats.skipGuest, stats.total)}</div>
        </div>
      ) : (
        <React.Fragment>
          <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 18, padding: "26px 20px", textAlign: "center", marginBottom: 16 }}>
            <div style={{ fontSize: 13, color: C.muted, letterSpacing: ".05em", textTransform: "uppercase" }}>{t.agreement}</div>
            <div style={{ fontFamily: serif, fontSize: 64, fontWeight: 400, color: C.accent, lineHeight: 1 }}>{stats.pct}%</div>
            <div style={{ fontSize: 14, color: C.muted, marginTop: 6 }}>{t.agreement_detail(stats.match, stats.total)}</div>
          </div>
          <div style={{ display: "flex", gap: 12, marginBottom: 18 }}>
            <Stat label={t.weiter_interviewer} value={stats.skipInt} />
            <Stat label={`${t.weiter_guest}${meta.guest ? " (" + meta.guest.split(" ")[0] + ")" : ""}`} value={stats.skipGuest} />
          </div>
        </React.Fragment>
      )}
      <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 12, overflow: "hidden" }}>
        {guestOnly ? (
          <div style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: 8, padding: "9px 12px", borderBottom: `2px solid ${C.line}`, fontSize: 11, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: ".05em" }}>
            <span>{t.col_question}</span><span>{meta.guest ? meta.guest.split(" ")[0] : t.col_guest_short}</span>
          </div>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "1fr auto auto", gap: 8, padding: "9px 12px", borderBottom: `2px solid ${C.line}`, fontSize: 11, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: ".05em" }}>
            <span>{t.col_question}</span><span>{t.col_interviewer_short}</span><span>{meta.guest ? meta.guest.split(" ")[0] : t.col_guest_short}</span>
          </div>
        )}
        <div style={{ maxHeight: "32vh", overflowY: "auto" }}>
          {list.map(q => {
            const i = aInt[q.nr], g = aGuest[q.nr]; const same = i && g && i === g;
            if (guestOnly) {
              return (
                <div key={q.nr} style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: 8, padding: "9px 12px", borderBottom: `1px solid ${C.paper}`, fontSize: 13, alignItems: "center" }}>
                  <span>{q.frage}</span><span style={{ textAlign: "right", color: g === "W" ? C.gold : C.ink }}>{lbl(q, g)}</span>
                </div>
              );
            }
            return (
              <div key={q.nr} style={{ display: "grid", gridTemplateColumns: "1fr auto auto", gap: 8, padding: "9px 12px", borderBottom: `1px solid ${C.paper}`, fontSize: 13, alignItems: "center", background: same ? "rgba(61,220,132,.12)" : "rgba(255,77,77,.06)" }}>
                <span>{q.frage}</span>
                <span style={{ textAlign: "right", color: i === "W" ? C.gold : C.ink }}>{lbl(q, i)}</span>
                <span style={{ textAlign: "right", color: g === "W" ? C.gold : C.ink, fontWeight: same ? 700 : 400 }}>{lbl(q, g)}</span>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{ marginTop: 18 }}>
        <label style={{ fontSize: 13, color: C.muted, display: "block", marginBottom: 8, letterSpacing: ".04em", textTransform: "uppercase" }}>{t.date_label}</label>
        <input type="date" value={date} onChange={e => setDate(e.target.value)} style={inputStyle} />
      </div>
      <div style={{ marginTop: 16, display: "flex", gap: 10 }}>
        <Btn variant={saved ? "ghost" : "primary"} onClick={handleSave} style={{ flex: 1 }}>{saved ? t.saved : t.save_interview}</Btn>
        <Btn variant="ghost" onClick={downloadPDF} style={{ flex: 1 }}>{t.download_pdf}</Btn>
      </div>
      <div style={{ fontSize: 12, color: C.muted, textAlign: "center", marginTop: 8 }}>{t.pdf_note}</div>
      <div style={{ marginTop: 16, display: "flex", gap: 10 }}>
        <Btn variant="ghost" onClick={onBack} style={{ flex: 1 }}>{t.back}</Btn>
        <Btn onClick={onRestart} style={{ flex: 2 }}>{t.new_interview}</Btn>
      </div>
    </Shell>
  );
}

/* ---------- ARCHIV ---------- */
function buildPDF(rec, t) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "pt", format: "a4" });
  const margin = 48; const pageW = doc.internal.pageSize.getWidth(); const pageH = doc.internal.pageSize.getHeight(); let y = margin;
  const lbl = (q, v) => v === "A" ? q.a : v === "B" ? q.b : v === "W" ? t.answer_continue : "—";
  doc.setFont("helvetica", "bold"); doc.setFontSize(20); doc.text("Alles gefragt?", margin, y); y += 26;
  doc.setFontSize(12); doc.setFont("helvetica", "normal");
  if (rec.interview) { doc.text(`${t.pdf_interviewer}: ${rec.interview}`, margin, y); y += 16; }
  doc.text(`${t.pdf_guest}: ${rec.guest || "—"}`, margin, y); y += 16;
  doc.text(`${t.pdf_date}: ${rec.date || "—"}`, margin, y); y += 24;
  doc.setFont("helvetica", "bold"); doc.setFontSize(11); doc.text(t.col_question, margin, y); doc.text(t.pdf_answer, pageW - margin, y, { align: "right" }); y += 6;
  doc.setLineWidth(0.5); doc.line(margin, y, pageW - margin, y); y += 16;
  doc.setFont("helvetica", "normal"); doc.setFontSize(11); const colW = pageW - margin * 2 - 120;
  (rec.questions || []).forEach(q => { const ans = lbl(q, rec.aGuest[q.nr]); const lines = doc.splitTextToSize(`${q.nr}. ${q.frage}`, colW); const blockH = lines.length * 14; if (y + blockH > pageH - margin) { doc.addPage(); y = margin; } doc.text(lines, margin, y); doc.text(ans, pageW - margin, y, { align: "right" }); y += blockH + 6; });
  const safe = (s) => (s || "interview").replace(/[^\w\-]+/g, "_");
  doc.save(`AllesGefragt_${safe(rec.guest)}_${rec.date || ""}.pdf`);
}

function ArchiveScreen({ items, onDelete, onBack, t }) {
  return (
    <Shell>
      <div style={{ paddingTop: 18 }} />
      <H sub={t.archive_sub(items.length)}>{t.archive_title}</H>
      {items.length === 0 ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: C.muted, textAlign: "center", padding: "40px 0" }}>{t.archive_empty}</div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {items.map(rec => {
            const total = (rec.questions || []).length;
            const skipGuest = (rec.questions || []).filter(q => rec.aGuest[q.nr] === "W").length;
            return (
              <div key={rec.id} style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 12, padding: 14 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8 }}>
                  <div style={{ fontWeight: 700, fontSize: 16 }}>{rec.guest || t.archive_no_name}</div>
                  <div style={{ fontSize: 12, color: C.muted }}>{rec.date}</div>
                </div>
                {rec.interview && <div style={{ fontSize: 13, color: C.muted, marginTop: 2 }}>{t.archive_interviewer}: {rec.interview}</div>}
                <div style={{ fontSize: 12, color: C.muted, marginTop: 6 }}>{total} {t.archive_questions} · {skipGuest}× {t.answer_continue}</div>
                <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                  <button onClick={() => buildPDF(rec, t)} style={{ flex: 2, background: C.accent, color: "#111", border: "none", padding: "10px", borderRadius: 10, cursor: "pointer", fontSize: 14, fontWeight: 600, fontFamily: sans }}>{t.download_pdf}</button>
                  <button onClick={() => onDelete(rec.id)} style={{ flex: 1, background: "none", color: C.red, border: `1px solid ${C.red}`, padding: "10px", borderRadius: 10, cursor: "pointer", fontSize: 14, fontFamily: sans }}>{t.archive_delete}</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
      <div style={{ marginTop: "auto", paddingTop: 24 }}><Btn variant="ghost" onClick={onBack}>{t.archive_back}</Btn></div>
    </Shell>
  );
}

/* ---------- ROOT ---------- */
function App() {
  const sv = loadState();
  const [lang, setLang] = useState(sv?.lang ?? "de");
  const t = T[lang];
  const [screen, setScreen] = useState(sv?.screen ?? 0);
  const [introText, setIntroText] = useState(sv?.introText ?? T[sv?.lang ?? "de"].start_default_greeting);
  const [questions, setQuestions] = useState(sv?.questions ?? localizedQuestions(sv?.lang ?? "de"));
  const [meta, setMeta] = useState(sv?.meta ?? { interview: "", guest: "" });
  const [mode, setMode] = useState(sv?.mode ?? "both");
  const [selected, setSelected] = useState(sv?.selected ?? QUESTIONS_BI.map(q => q.nr));
  const [aInt, setAInt] = useState(sv?.aInt ?? {});
  const [aGuest, setAGuest] = useState(sv?.aGuest ?? {});
  const [savedInterviews, setSavedInterviews] = useState(sv?.savedInterviews ?? []);
  // Merkt, ob der Nutzer eine eigene Liste hochgeladen hat (dann nicht durch Sprachwechsel überschreiben)
  const [customList, setCustomList] = useState(sv?.customList ?? false);

  useEffect(() => { saveState({ lang, screen, introText, questions, meta, mode, selected, aInt, aGuest, savedInterviews, customList }); },
    [lang, screen, introText, questions, meta, mode, selected, aInt, aGuest, savedInterviews, customList]);

  // Sprachwechsel: Standardfragen + Default-Begrüßung mitübersetzen (nur wenn nicht angepasst)
  const prevLang = useRef(lang);
  useEffect(() => {
    if (prevLang.current !== lang) {
      if (!customList) setQuestions(localizedQuestions(lang));
      setIntroText(prev => (prev === T[prevLang.current].start_default_greeting ? T[lang].start_default_greeting : prev));
      prevLang.current = lang;
    }
  }, [lang, customList]);

  const selectedList = useMemo(() => questions.filter(q => selected.includes(q.nr)), [questions, selected]);
  const setQuestionsAndSelect = (q) => { setQuestions(q); setSelected(q.map(x => x.nr)); setCustomList(true); };
  const resetToDefault = () => { setCustomList(false); const dq = localizedQuestions(lang); setQuestions(dq); setSelected(dq.map(x => x.nr)); };

  const newInterview = () => { setScreen(0); setMeta({ interview: "", guest: "" }); setAInt({}); setAGuest({}); };
  const saveInterview = (m) => { setMeta(m); setSavedInterviews(list => [{ id: Date.now(), interview: m.interview, guest: m.guest, date: m.date, questions: selectedList, aInt: { ...aInt }, aGuest: { ...aGuest } }, ...list]); };
  const deleteInterview = (id) => { if (!confirm(t.confirm_delete)) return; setSavedInterviews(list => list.filter(r => r.id !== id)); };
  const fullReset = () => {
    if (!confirm(t.confirm_reset_all)) return;
    clearState(); setScreen(0); setIntroText(T[lang].start_default_greeting);
    setCustomList(false); const dq = localizedQuestions(lang); setQuestions(dq); setSelected(dq.map(q => q.nr));
    setMeta({ interview: "", guest: "" }); setMode("both"); setAInt({}); setAGuest({}); setSavedInterviews([]);
  };
  const startInterview = () => {
    const hasAnswers = Object.keys(aInt).length > 0 || Object.keys(aGuest).length > 0;
    if (hasAnswers) { if (confirm(t.confirm_new_answers)) { setAInt({}); setAGuest({}); } }
    else { setAInt({}); setAGuest({}); }
    setScreen(mode === "guest" ? 4 : 3);
  };

  switch (screen) {
    case "archive": return <ArchiveScreen items={savedInterviews} onDelete={deleteInterview} onBack={() => setScreen(0)} t={t} />;
    case 0: return <StartScreen introText={introText} setIntroText={setIntroText} mode={mode} setMode={setMode} onNext={() => setScreen(1)} onReset={fullReset} onArchive={() => setScreen("archive")} archiveCount={savedInterviews.length} lang={lang} setLang={setLang} t={t} />;
    case 1: return <UploadScreen questions={questions} setQuestions={setQuestionsAndSelect} resetToDefault={resetToDefault} mode={mode} onNext={() => setScreen(2)} onBack={() => setScreen(0)} t={t} />;
    case 2: return <SetupScreen questions={questions} meta={meta} setMeta={setMeta} selected={selected} setSelected={setSelected} mode={mode} onNext={startInterview} onBack={() => setScreen(1)} t={t} />;
    case 3: return <AnswerScreen step={3} who="interviewer" subject="Interviewer" list={selectedList} answers={aInt} setAnswers={setAInt} mode={mode} onNext={() => setScreen(4)} onBack={() => setScreen(2)} t={t} />;
    case 4: return <AnswerScreen step={4} who="guest" subject={meta.guest} list={selectedList} answers={aGuest} setAnswers={setAGuest} mode={mode} onNext={() => setScreen(5)} onBack={() => setScreen(mode === "guest" ? 2 : 3)} t={t} />;
    case 5: return <CompareScreen list={selectedList} meta={meta} aInt={aInt} aGuest={aGuest} mode={mode} onRestart={newInterview} onBack={() => setScreen(4)} onSave={saveInterview} lang={lang} t={t} />;
    default: return null;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
