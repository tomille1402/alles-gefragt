/* ---------- Design Tokens (am Logo orientiert) ---------- */
const C = {
  ink: "#f4f1e8",
  paper: "#0c0c0c",
  card: "#1a1a1a",
  line: "#333130",
  accent: "#f5c518",
  accentSoft: "rgba(245,197,24,0.14)",
  gold: "#f5c518",
  green: "#3ddc84",
  red: "#ff4d4d",
  white: "#f4f1e8",
  muted: "#8a857c",
};
const serif = "'Anton','Oswald','Arial Narrow',sans-serif";
const sans = "'Newsreader','Georgia',serif";

/* ---------- localStorage Helfer ---------- */
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}
function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}
function clearState() {
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
}

/* ---------- Bausteine ---------- */
function Shell({ children }) {
  return (
    <div style={{
      height: "100%", background: C.paper, color: C.ink, fontFamily: sans,
      backgroundImage:
        "radial-gradient(circle at 50% 0%, rgba(245,197,24,0.10), transparent 45%)," +
        "radial-gradient(circle at 90% 95%, rgba(245,197,24,0.05), transparent 45%)",
    }}>
      <div style={{
        maxWidth: 560, margin: "0 auto", padding: "0 18px",
        height: "100%", display: "flex", flexDirection: "column",
        overflowY: "auto", WebkitOverflowScrolling: "touch", overscrollBehavior: "contain",
      }}>
        <div style={{ paddingBottom: 120, display: "flex", flexDirection: "column", flex: 1 }}>
          {children}
        </div>
      </div>
    </div>
  );
}

function StepBar({ step, mode }) {
  const labels = mode === "guest"
    ? ["Start", "Upload", "Setup", "Gast", "Abgleich"]
    : ["Start", "Upload", "Setup", "Interviewer", "Gast", "Abgleich"];
  // step ist die echte screen-Nummer (0..5); in guest-Modus den Interviewer-Index (3) auslassen
  const activeIndex = mode === "guest" && step >= 4 ? step - 1 : step;
  return (
    <div style={{
      display: "flex", gap: 5, padding: "16px 0 8px", flexWrap: "wrap",
      position: "sticky", top: 0, zIndex: 10, background: C.paper,
    }}>
      {labels.map((l, i) => (
        <div key={l} style={{ flex: 1, minWidth: 44 }}>
          <div style={{ height: 4, borderRadius: 4, background: i <= activeIndex ? C.accent : C.line, transition: "background .3s" }} />
          <div style={{ fontSize: 10, marginTop: 5, textAlign: "center", letterSpacing: ".04em", textTransform: "uppercase", color: i === activeIndex ? C.accent : C.muted, fontWeight: i === activeIndex ? 700 : 500 }}>{l}</div>
        </div>
      ))}
    </div>
  );
}

function Btn({ children, onClick, disabled, variant = "primary", style }) {
  const base = { padding: "14px 20px", borderRadius: 12, fontSize: 16, fontWeight: 600, cursor: disabled ? "not-allowed" : "pointer", border: "1px solid transparent", width: "100%", fontFamily: sans, transition: "transform .1s", opacity: disabled ? 0.45 : 1 };
  const variants = {
    primary: { background: C.accent, color: "#111", boxShadow: "0 6px 22px rgba(245,197,24,.30)" },
    ghost: { background: "transparent", color: C.ink, border: `1px solid ${C.line}` },
  };
  return (
    <button onClick={disabled ? undefined : onClick} style={{ ...base, ...variants[variant], ...style }}
      onTouchStart={() => {}}
      onMouseDown={e => !disabled && (e.currentTarget.style.transform = "scale(.98)")}
      onMouseUp={e => (e.currentTarget.style.transform = "scale(1)")}
      onMouseLeave={e => (e.currentTarget.style.transform = "scale(1)")}>
      {children}
    </button>
  );
}

function H({ children, sub }) {
  return (
    <div style={{ marginBottom: 18 }}>
      <h1 style={{ fontFamily: serif, fontSize: 30, fontWeight: 400, margin: 0, lineHeight: 1.1, letterSpacing: ".01em", textTransform: "uppercase" }}>{children}</h1>
      {sub && <p style={{ color: C.muted, margin: "8px 0 0", fontSize: 15 }}>{sub}</p>}
    </div>
  );
}

const inputStyle = { width: "100%", padding: 14, borderRadius: 12, border: `1px solid ${C.line}`, background: C.card, fontFamily: sans, fontSize: 16, color: C.ink, boxSizing: "border-box" };

/* ---------- 1 START ---------- */
function StartScreen({ onNext, introText, setIntroText, onReset, mode, setMode, onArchive, archiveCount }) {
  const Choice = ({ val, label, desc }) => (
    <button onClick={() => setMode(val)} style={{
      flex: 1, textAlign: "left", padding: "14px 14px", borderRadius: 12, cursor: "pointer",
      background: mode === val ? C.accentSoft : C.card,
      border: `1px solid ${mode === val ? C.accent : C.line}`, fontFamily: sans,
    }}>
      <div style={{ fontWeight: 700, color: mode === val ? C.accent : C.ink, fontSize: 15 }}>{label}</div>
      <div style={{ fontSize: 12, color: C.muted, marginTop: 3 }}>{desc}</div>
    </button>
  );
  return (
    <Shell>
      <StepBar step={0} mode={mode} />
      <div style={{ height: "42vh", minHeight: 260, display: "flex", alignItems: "center", justifyContent: "center", marginTop: 4 }}>
        <img src={LOGO} alt="Alles gefragt?" style={{ maxHeight: "100%", maxWidth: "100%", objectFit: "contain", borderRadius: 20, boxShadow: "0 14px 50px rgba(245,197,24,.15)" }} />
      </div>
      <div style={{ flex: 1, marginTop: 18 }}>
        <label style={{ fontSize: 13, color: C.muted, display: "block", marginBottom: 8, letterSpacing: ".04em", textTransform: "uppercase" }}>Ablauf wählen</label>
        <div style={{ display: "flex", gap: 10, marginBottom: 18 }}>
          <Choice val="both" label="Interviewer + Gast" desc="Beide antworten, danach Abgleich" />
          <Choice val="guest" label="Nur Gast" desc="Nur der Gast antwortet" />
        </div>
        <label style={{ fontSize: 13, color: C.muted, display: "block", marginBottom: 8, letterSpacing: ".04em", textTransform: "uppercase" }}>Begrüßungstext</label>
        <textarea value={introText} onChange={e => setIntroText(e.target.value)} placeholder="Individueller Text für den Einstieg …"
          style={{ ...inputStyle, minHeight: 80, resize: "vertical" }} />
      </div>
      <div style={{ marginTop: 18 }}>
        <Btn onClick={onNext}>Los geht's →</Btn>
        <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
          <button onClick={onArchive} style={{ flex: 1, background: "none", border: `1px solid ${C.line}`, color: C.ink, padding: "10px", borderRadius: 10, cursor: "pointer", fontSize: 13, fontFamily: sans }}>
            Archiv ({archiveCount})
          </button>
          <button onClick={onReset} style={{ flex: 1, background: "none", border: `1px solid ${C.line}`, color: C.muted, padding: "10px", borderRadius: 10, cursor: "pointer", fontSize: 13, fontFamily: sans }}>
            Alles zurücksetzen
          </button>
        </div>
      </div>
    </Shell>
  );
}

/* ---------- 2 UPLOAD ---------- */
function UploadScreen({ onNext, onBack, questions, setQuestions, resetToDefault, mode }) {
  const [err, setErr] = useState("");
  const inputRef = useRef();

  const handleFile = (file) => {
    setErr("");
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
        const parsed = rows.map((r, i) => {
          const get = (keys) => {
            for (const k of Object.keys(r)) {
              if (keys.some(t => k.toLowerCase().trim() === t)) return r[k];
            }
            return "";
          };
          return {
            nr: get(["nr.", "nr", "nummer"]) || i + 1,
            frage: String(get(["frage", "question"]) || "").trim(),
            a: String(get(["a"]) || "").trim(),
            b: String(get(["b"]) || "").trim(),
          };
        }).filter(q => q.frage);
        if (!parsed.length) { setErr("Keine Fragen gefunden. Erwartet: Spalten Nr., Frage, A, B."); return; }
        setQuestions(parsed);
      } catch (ex) { setErr("Datei konnte nicht gelesen werden. Bitte gültige .xlsx verwenden."); }
    };
    reader.readAsArrayBuffer(file);
  };

  return (
    <Shell>
      <StepBar step={1} mode={mode} />
      <H sub="Lade eine Excel-Datei mit den Spalten Nr., Frage, A und B hoch. Deine Liste bleibt auf diesem Gerät gespeichert.">Fragen laden</H>
      <div onClick={() => inputRef.current.click()}
        onDragOver={e => e.preventDefault()}
        onDrop={e => { e.preventDefault(); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); }}
        style={{ border: `2px dashed ${C.accent}`, borderRadius: 16, padding: "36px 20px", textAlign: "center", cursor: "pointer", background: C.card }}>
        <div style={{ fontSize: 40 }}>⬆</div>
        <div style={{ fontWeight: 600, marginTop: 8 }}>Excel-Datei hochladen</div>
        <div style={{ fontSize: 13, color: C.muted, marginTop: 4 }}>Tippen oder Datei hierher ziehen (.xlsx)</div>
        <input ref={inputRef} type="file" accept=".xlsx,.xls" style={{ display: "none" }}
          onChange={e => e.target.files[0] && handleFile(e.target.files[0])} />
      </div>
      {err && <div style={{ color: C.red, marginTop: 14, fontSize: 14 }}>{err}</div>}
      <div style={{ marginTop: 18, padding: 16, borderRadius: 12, background: C.card, border: `1px solid ${C.line}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
          <span style={{ fontWeight: 600 }}>Aktuell geladen</span>
          <span style={{ fontFamily: serif, fontSize: 26, color: C.accent }}>{questions.length}</span>
        </div>
        <div style={{ fontSize: 13, color: C.muted, marginTop: 4 }}>Fragen verfügbar</div>
        <button onClick={resetToDefault} style={{ background: "none", border: `1px solid ${C.line}`, color: C.muted, marginTop: 12, padding: "8px 12px", borderRadius: 8, cursor: "pointer", fontSize: 13, fontFamily: sans }}>
          Auf 121 Standardfragen zurücksetzen
        </button>
      </div>
      <div style={{ marginTop: "auto", paddingTop: 24, display: "flex", gap: 10 }}>
        <Btn variant="ghost" onClick={onBack} style={{ flex: 1 }}>← Zurück</Btn>
        <Btn onClick={onNext} disabled={!questions.length} style={{ flex: 2 }}>Weiter →</Btn>
      </div>
    </Shell>
  );
}

/* ---------- 3 SETUP ---------- */
function SetupScreen({ onNext, onBack, questions, meta, setMeta, selected, setSelected, mode }) {
  const toggle = (nr) => setSelected(s => s.includes(nr) ? s.filter(x => x !== nr) : [...s, nr]);
  const allSelected = selected.length === questions.length;
  return (
    <Shell>
      <StepBar step={2} mode={mode} />
      <H sub="Benenne Interviewer und Gast/Gästin und wähle die Fragen aus.">Interview einrichten</H>
      <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 18 }}>
        {mode !== "guest" && (
          <input value={meta.interview} onChange={e => setMeta({ ...meta, interview: e.target.value })} placeholder="Name des Interviewers" style={inputStyle} />
        )}
        <input value={meta.guest} onChange={e => setMeta({ ...meta, guest: e.target.value })} placeholder="Name des Gastes / der Gästin" style={inputStyle} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <span style={{ fontWeight: 600 }}>Fragen auswählen <span style={{ color: C.accent }}>({selected.length})</span></span>
        <button onClick={() => setSelected(allSelected ? [] : questions.map(q => q.nr))} style={{ background: "none", border: "none", color: C.accent, fontWeight: 600, cursor: "pointer", fontSize: 14, fontFamily: sans }}>
          {allSelected ? "Alle abwählen" : "Alle auswählen"}
        </button>
      </div>
      <div style={{ border: `1px solid ${C.line}`, borderRadius: 12, overflow: "hidden", background: C.card, maxHeight: "42vh", overflowY: "auto" }}>
        {questions.map((q, i) => {
          const on = selected.includes(q.nr);
          return (
            <label key={q.nr} style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 14px", borderBottom: i < questions.length - 1 ? `1px solid ${C.paper}` : "none", cursor: "pointer", background: on ? C.accentSoft : "transparent" }}>
              <input type="checkbox" checked={on} onChange={() => toggle(q.nr)} style={{ width: 18, height: 18, accentColor: C.accent }} />
              <span style={{ fontSize: 15 }}>{q.frage}</span>
            </label>
          );
        })}
      </div>
      <div style={{ marginTop: "auto", paddingTop: 24, display: "flex", gap: 10 }}>
        <Btn variant="ghost" onClick={onBack} style={{ flex: 1 }}>← Zurück</Btn>
        <Btn onClick={onNext} disabled={!selected.length} style={{ flex: 2 }}>Speichern & weiter →</Btn>
      </div>
    </Shell>
  );
}

function gridRow(isHead) {
  return { display: "grid", gridTemplateColumns: "1fr 52px 52px 46px", alignItems: "center", gap: 6, padding: isHead ? "6px 8px" : "10px 8px", borderBottom: isHead ? `2px solid ${C.line}` : `1px solid ${C.paper}`, borderRadius: isHead ? 0 : 8 };
}
const cellHead = { fontSize: 11, fontWeight: 700, textAlign: "center", color: C.muted, letterSpacing: ".06em", textTransform: "uppercase" };

function Radio({ label, checked, onChange, name, tone = C.accent }) {
  return (
    <label style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, cursor: "pointer", textAlign: "center" }}>
      <span style={{ width: 22, height: 22, borderRadius: "50%", border: `2px solid ${checked ? tone : C.line}`, background: checked ? tone : "transparent", boxShadow: checked ? `0 0 10px ${tone}88` : "none", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all .15s" }}>
        {checked && <span style={{ width: 8, height: 8, borderRadius: "50%", background: C.paper }} />}
      </span>
      {label !== "" && <span style={{ fontSize: 10, lineHeight: 1.05, color: checked ? C.ink : C.muted, maxWidth: 50 }}>{label}</span>}
      <input type="radio" name={name} checked={checked} onChange={onChange} style={{ display: "none" }} />
    </label>
  );
}

function AnswerScreen({ step, who, subject, list, answers, setAnswers, onNext, onBack, mode }) {
  const total = list.length;
  const weiterLimit = Math.floor(total * 0.10); // 10% abgerundet
  const weiterCount = list.filter(q => answers[q.nr] === "W").length;
  const weiterPct = total ? Math.round((weiterCount / total) * 100) : 0;
  const overLimit = weiterCount > weiterLimit;

  const choose = (nr, val) => setAnswers(a => ({ ...a, [nr]: val }));
  const done = list.every(q => answers[q.nr]);

  const counterColor = overLimit ? C.red : C.muted;

  return (
    <Shell>
      <StepBar step={step} mode={mode} />
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
        <H sub={`Eine Antwort pro Frage. ${who === "interviewer" ? "Bitte zuerst vom Interviewer ausfüllen." : "Antworten während des Interviews erfassen."}`}>
          {who === "interviewer" ? "Interviewer antwortet" : `${subject || "Gast"} antwortet`}
        </H>
        {/* LIVE-Zähler oben rechts */}
        <div style={{ flexShrink: 0, textAlign: "right", border: `1px solid ${overLimit ? C.red : C.line}`, borderRadius: 10, padding: "8px 10px", background: C.card, marginTop: 4 }}>
          <div style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: ".04em" }}>„weiter“</div>
          <div style={{ fontFamily: serif, fontSize: 22, color: counterColor, lineHeight: 1.1 }}>{weiterPct}%</div>
          <div style={{ fontSize: 11, color: counterColor }}>{weiterCount} / {weiterLimit} erlaubt</div>
        </div>
      </div>

      {overLimit && (
        <div style={{ background: "rgba(255,77,77,.12)", border: `1px solid ${C.red}`, color: C.red, borderRadius: 10, padding: "10px 12px", fontSize: 13, marginBottom: 12 }}>
          Hinweis: „weiter“ sollte bei höchstens {weiterLimit} von {total} Fragen (10 %) gewählt werden. Aktuell sind es {weiterCount}.
        </div>
      )}

      <div style={gridRow(true)}>
        <div style={{ ...cellHead, textAlign: "left" }}>Frage</div>
        <div style={cellHead}>A</div>
        <div style={cellHead}>B</div>
        <div style={cellHead}>weiter</div>
      </div>
      <div style={{ overflowY: "auto", maxHeight: "52vh", paddingRight: 2 }}>
        {list.map((q) => {
          const v = answers[q.nr];
          return (
            <div key={q.nr} style={{ ...gridRow(false), background: v ? C.card : "transparent" }}>
              <div style={{ fontSize: 14, lineHeight: 1.25, paddingRight: 4 }}>
                <span style={{ color: C.muted, fontSize: 11 }}>{q.nr}. </span>{q.frage}
              </div>
              <Radio label={q.a} checked={v === "A"} onChange={() => choose(q.nr, "A")} name={`${who}-${q.nr}`} tone={C.green} />
              <Radio label={q.b} checked={v === "B"} onChange={() => choose(q.nr, "B")} name={`${who}-${q.nr}`} tone={C.red} />
              <Radio label="" checked={v === "W"} onChange={() => choose(q.nr, "W")} name={`${who}-${q.nr}`} tone={C.white} />
            </div>
          );
        })}
      </div>
      <div style={{ fontSize: 13, color: C.muted, textAlign: "center", marginTop: 10 }}>
        {list.filter(q => answers[q.nr]).length} / {list.length} beantwortet
      </div>
      <div style={{ marginTop: 16, display: "flex", gap: 10 }}>
        <Btn variant="ghost" onClick={onBack} style={{ flex: 1 }}>← Zurück</Btn>
        <Btn onClick={onNext} disabled={!done} style={{ flex: 2 }}>Speichern & weiter →</Btn>
      </div>
    </Shell>
  );
}

/* ---------- 6 ABGLEICH ---------- */
function Stat({ label, value }) {
  return (
    <div style={{ flex: 1, background: C.card, border: `1px solid ${C.line}`, borderRadius: 12, padding: "14px 12px", textAlign: "center" }}>
      <div style={{ fontFamily: serif, fontSize: 30, color: C.gold }}>{value}</div>
      <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{label}</div>
    </div>
  );
}

function CompareScreen({ list, meta, aInt, aGuest, onRestart, onBack, onSave, mode }) {
  const today = new Date().toISOString().slice(0, 10);
  const [date, setDate] = useState(meta.date || today);
  const [saved, setSaved] = useState(false);
  const guestOnly = mode === "guest";

  const stats = useMemo(() => {
    let match = 0, skipInt = 0, skipGuest = 0;
    const total = list.length;
    list.forEach(q => {
      const i = aInt[q.nr], g = aGuest[q.nr];
      if (i === "W") skipInt++;
      if (g === "W") skipGuest++;
      if (i && g && i === g) match++;
    });
    const pct = total ? Math.round((match / total) * 100) : 0;
    const guestWeiterPct = total ? Math.round((skipGuest / total) * 100) : 0;
    return { match, total, pct, skipInt, skipGuest, guestWeiterPct };
  }, [list, aInt, aGuest]);

  const lbl = (q, v) => v === "A" ? q.a : v === "B" ? q.b : v === "W" ? "weiter" : "—";

  const handleSave = () => { onSave({ ...meta, date }); setSaved(true); };

  const downloadPDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "a4" });
    const margin = 48;
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();
    let y = margin;
    doc.setFont("helvetica", "bold"); doc.setFontSize(20);
    doc.text("Alles gefragt?", margin, y); y += 26;
    doc.setFontSize(12); doc.setFont("helvetica", "normal");
    if (!guestOnly && meta.interview) { doc.text(`Interviewer: ${meta.interview}`, margin, y); y += 16; }
    doc.text(`Gast / Gästin: ${meta.guest || "—"}`, margin, y); y += 16;
    doc.text(`Datum: ${date}`, margin, y); y += 24;
    doc.setFont("helvetica", "bold"); doc.setFontSize(11);
    doc.text("Frage", margin, y);
    doc.text("Antwort", pageW - margin, y, { align: "right" }); y += 6;
    doc.setLineWidth(0.5); doc.line(margin, y, pageW - margin, y); y += 16;
    doc.setFont("helvetica", "normal"); doc.setFontSize(11);
    const colW = pageW - margin * 2 - 120;
    list.forEach(q => {
      const ans = lbl(q, aGuest[q.nr]);
      const lines = doc.splitTextToSize(`${q.nr}. ${q.frage}`, colW);
      const blockH = lines.length * 14;
      if (y + blockH > pageH - margin) { doc.addPage(); y = margin; }
      doc.text(lines, margin, y);
      doc.text(ans, pageW - margin, y, { align: "right" });
      y += blockH + 6;
    });
    const safe = (s) => (s || "interview").replace(/[^\w\-]+/g, "_");
    doc.save(`AllesGefragt_${safe(meta.guest)}_${date}.pdf`);
  };

  return (
    <Shell>
      <StepBar step={5} mode={mode} />
      <H sub={meta.interview && !guestOnly ? `„${meta.interview}“ — mit ${meta.guest || "Gast"}` : (meta.guest || "Auswertung des Interviews")}>
        {guestOnly ? "Auswertung" : "Abgleich"}
      </H>

      {guestOnly ? (
        /* NUR GAST: keine Übereinstimmung, nur weiter-Statistik */
        <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 18, padding: "26px 20px", textAlign: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 13, color: C.muted, letterSpacing: ".05em", textTransform: "uppercase" }}>„weiter“-Antworten</div>
          <div style={{ fontFamily: serif, fontSize: 64, fontWeight: 400, color: C.accent, lineHeight: 1 }}>{stats.guestWeiterPct}%</div>
          <div style={{ fontSize: 14, color: C.muted, marginTop: 6 }}>{stats.skipGuest} von {stats.total} Fragen mit „weiter“ beantwortet</div>
        </div>
      ) : (
        <React.Fragment>
          <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 18, padding: "26px 20px", textAlign: "center", marginBottom: 16 }}>
            <div style={{ fontSize: 13, color: C.muted, letterSpacing: ".05em", textTransform: "uppercase" }}>Übereinstimmung</div>
            <div style={{ fontFamily: serif, fontSize: 64, fontWeight: 400, color: C.accent, lineHeight: 1 }}>{stats.pct}%</div>
            <div style={{ fontSize: 14, color: C.muted, marginTop: 6 }}>{stats.match} von {stats.total} Fragen gleich beantwortet</div>
          </div>
          <div style={{ display: "flex", gap: 12, marginBottom: 18 }}>
            <Stat label='„weiter“ — Interviewer' value={stats.skipInt} />
            <Stat label={`„weiter“ — ${meta.guest || "Gast"}`} value={stats.skipGuest} />
          </div>
        </React.Fragment>
      )}

      <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 12, overflow: "hidden" }}>
        {guestOnly ? (
          <div style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: 8, padding: "9px 12px", borderBottom: `2px solid ${C.line}`, fontSize: 11, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: ".05em" }}>
            <span>Frage</span><span>{meta.guest ? meta.guest.split(" ")[0] : "Gast"}</span>
          </div>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "1fr auto auto", gap: 8, padding: "9px 12px", borderBottom: `2px solid ${C.line}`, fontSize: 11, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: ".05em" }}>
            <span>Frage</span><span>Interv.</span><span>{meta.guest ? meta.guest.split(" ")[0] : "Gast"}</span>
          </div>
        )}
        <div style={{ maxHeight: "32vh", overflowY: "auto" }}>
          {list.map(q => {
            const i = aInt[q.nr], g = aGuest[q.nr];
            const same = i && g && i === g;
            if (guestOnly) {
              return (
                <div key={q.nr} style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: 8, padding: "9px 12px", borderBottom: `1px solid ${C.paper}`, fontSize: 13, alignItems: "center" }}>
                  <span>{q.frage}</span>
                  <span style={{ textAlign: "right", color: g === "W" ? C.gold : C.ink }}>{lbl(q, g)}</span>
                </div>
              );
            }
            return (
              <div key={q.nr} style={{ display: "grid", gridTemplateColumns: "1fr auto auto", gap: 8, padding: "9px 12px", borderBottom: `1px solid ${C.paper}`, fontSize: 13, alignItems: "center", background: same ? "rgba(61,220,132,.12)" : "rgba(255,77,77,.06)" }}>
                <span>{q.frage}</span>
                <span style={{ textAlign: "right", color: i === "W" ? C.gold : C.ink }}>{lbl(q, i)}</span>
                <span style={{ textAlign: "right", color: g === "W" ? C.gold : C.ink, fontWeight: same ? 700 : 400 }}>{lbl(q, g)}</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* Interview-Datum */}
      <div style={{ marginTop: 18 }}>
        <label style={{ fontSize: 13, color: C.muted, display: "block", marginBottom: 8, letterSpacing: ".04em", textTransform: "uppercase" }}>Datum des Interviews</label>
        <input type="date" value={date} onChange={e => setDate(e.target.value)} style={inputStyle} />
      </div>

      {/* Speichern + PDF */}
      <div style={{ marginTop: 16, display: "flex", gap: 10 }}>
        <Btn variant={saved ? "ghost" : "primary"} onClick={handleSave} style={{ flex: 1 }}>
          {saved ? "✓ Gespeichert" : "Interview speichern"}
        </Btn>
        <Btn variant="ghost" onClick={downloadPDF} style={{ flex: 1 }}>PDF herunterladen</Btn>
      </div>
      <div style={{ fontSize: 12, color: C.muted, textAlign: "center", marginTop: 8 }}>
        Das PDF enthält alle Fragen mit den Antworten des Gastes / der Gästin.
      </div>

      <div style={{ marginTop: 16, display: "flex", gap: 10 }}>
        <Btn variant="ghost" onClick={onBack} style={{ flex: 1 }}>← Zurück</Btn>
        <Btn onClick={onRestart} style={{ flex: 2 }}>Neues Interview</Btn>
      </div>
    </Shell>
  );
}

/* ---------- ARCHIV ---------- */
function buildPDF(rec) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "pt", format: "a4" });
  const margin = 48;
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  let y = margin;
  const lbl = (q, v) => v === "A" ? q.a : v === "B" ? q.b : v === "W" ? "weiter" : "—";
  doc.setFont("helvetica", "bold"); doc.setFontSize(20);
  doc.text("Alles gefragt?", margin, y); y += 26;
  doc.setFontSize(12); doc.setFont("helvetica", "normal");
  if (rec.interview) { doc.text(`Interviewer: ${rec.interview}`, margin, y); y += 16; }
  doc.text(`Gast / Gästin: ${rec.guest || "—"}`, margin, y); y += 16;
  doc.text(`Datum: ${rec.date || "—"}`, margin, y); y += 24;
  doc.setFont("helvetica", "bold"); doc.setFontSize(11);
  doc.text("Frage", margin, y);
  doc.text("Antwort", pageW - margin, y, { align: "right" }); y += 6;
  doc.setLineWidth(0.5); doc.line(margin, y, pageW - margin, y); y += 16;
  doc.setFont("helvetica", "normal"); doc.setFontSize(11);
  const colW = pageW - margin * 2 - 120;
  (rec.questions || []).forEach(q => {
    const ans = lbl(q, rec.aGuest[q.nr]);
    const lines = doc.splitTextToSize(`${q.nr}. ${q.frage}`, colW);
    const blockH = lines.length * 14;
    if (y + blockH > pageH - margin) { doc.addPage(); y = margin; }
    doc.text(lines, margin, y);
    doc.text(ans, pageW - margin, y, { align: "right" });
    y += blockH + 6;
  });
  const safe = (s) => (s || "interview").replace(/[^\w\-]+/g, "_");
  doc.save(`AllesGefragt_${safe(rec.guest)}_${rec.date || ""}.pdf`);
}

function ArchiveScreen({ items, onDelete, onBack }) {
  return (
    <Shell>
      <div style={{ paddingTop: 18 }} />
      <H sub={items.length ? `${items.length} gespeicherte${items.length === 1 ? "s" : ""} Interview${items.length === 1 ? "" : "s"}` : "Noch keine Interviews gespeichert."}>Archiv</H>

      {items.length === 0 ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: C.muted, textAlign: "center", padding: "40px 0" }}>
          Gespeicherte Interviews erscheinen hier — inklusive PDF-Download.
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {items.map(rec => {
            const total = (rec.questions || []).length;
            const skipGuest = (rec.questions || []).filter(q => rec.aGuest[q.nr] === "W").length;
            return (
              <div key={rec.id} style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 12, padding: 14 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8 }}>
                  <div style={{ fontWeight: 700, fontSize: 16 }}>{rec.guest || "Ohne Namen"}</div>
                  <div style={{ fontSize: 12, color: C.muted }}>{rec.date}</div>
                </div>
                {rec.interview && <div style={{ fontSize: 13, color: C.muted, marginTop: 2 }}>Interviewer: {rec.interview}</div>}
                <div style={{ fontSize: 12, color: C.muted, marginTop: 6 }}>{total} Fragen · {skipGuest}× „weiter“</div>
                <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                  <button onClick={() => buildPDF(rec)} style={{ flex: 2, background: C.accent, color: "#111", border: "none", padding: "10px", borderRadius: 10, cursor: "pointer", fontSize: 14, fontWeight: 600, fontFamily: sans }}>
                    PDF herunterladen
                  </button>
                  <button onClick={() => onDelete(rec.id)} style={{ flex: 1, background: "none", color: C.red, border: `1px solid ${C.red}`, padding: "10px", borderRadius: 10, cursor: "pointer", fontSize: 14, fontFamily: sans }}>
                    Löschen
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      <div style={{ marginTop: "auto", paddingTop: 24 }}>
        <Btn variant="ghost" onClick={onBack}>← Zurück zum Start</Btn>
      </div>
    </Shell>
  );
}

/* ---------- ROOT mit Persistenz ---------- */
function App() {
  const saved = loadState();
  const [screen, setScreen] = useState(saved?.screen ?? 0);
  const [introText, setIntroText] = useState(saved?.introText ?? "Willkommen bei „Alles gefragt?“ — dem Spiel der ehrlichen Antworten.");
  const [questions, setQuestions] = useState(saved?.questions ?? DEFAULT_QUESTIONS);
  const [meta, setMeta] = useState(saved?.meta ?? { interview: "", guest: "" });
  const [mode, setMode] = useState(saved?.mode ?? "both"); // "both" | "guest"
  const [selected, setSelected] = useState(saved?.selected ?? DEFAULT_QUESTIONS.map(q => q.nr));
  const [aInt, setAInt] = useState(saved?.aInt ?? {});
  const [aGuest, setAGuest] = useState(saved?.aGuest ?? {});
  const [savedInterviews, setSavedInterviews] = useState(saved?.savedInterviews ?? []);

  // Bei jeder Änderung alles speichern
  useEffect(() => {
    saveState({ screen, introText, questions, meta, mode, selected, aInt, aGuest, savedInterviews });
  }, [screen, introText, questions, meta, mode, selected, aInt, aGuest, savedInterviews]);

  const selectedList = useMemo(() => questions.filter(q => selected.includes(q.nr)), [questions, selected]);

  const setQuestionsAndSelect = (q) => { setQuestions(q); setSelected(q.map(x => x.nr)); };
  const resetToDefault = () => setQuestionsAndSelect(DEFAULT_QUESTIONS);

  const newInterview = () => {
    setScreen(0);
    setMeta({ interview: "", guest: "" });
    setAInt({});
    setAGuest({});
  };

  const saveInterview = (metaWithDate) => {
    setMeta(metaWithDate);
    const record = {
      id: Date.now(),
      interview: metaWithDate.interview,
      guest: metaWithDate.guest,
      date: metaWithDate.date,
      questions: selectedList,
      aInt: { ...aInt },
      aGuest: { ...aGuest },
    };
    setSavedInterviews(list => [record, ...list]);
  };

  const deleteInterview = (id) => {
    if (!confirm("Dieses Interview wirklich löschen?")) return;
    setSavedInterviews(list => list.filter(r => r.id !== id));
  };

  const fullReset = () => {
    if (!confirm("Wirklich alles zurücksetzen? Fragenliste, Auswahl, Antworten und gespeicherte Interviews werden gelöscht.")) return;
    clearState();
    setScreen(0); setIntroText("Willkommen bei „Alles gefragt?“ — dem Spiel der ehrlichen Antworten.");
    setQuestions(DEFAULT_QUESTIONS); setMeta({ interview: "", guest: "" }); setMode("both");
    setSelected(DEFAULT_QUESTIONS.map(q => q.nr)); setAInt({}); setAGuest({}); setSavedInterviews([]);
  };

  const startInterview = () => {
    // Vor Beginn der Befragung alle Antworten zurücksetzen.
    // Falls schon Antworten existieren (z.B. man ist nur kurz zurückgesprungen),
    // nachfragen, um versehentliches Löschen zu vermeiden.
    const hasAnswers = Object.keys(aInt).length > 0 || Object.keys(aGuest).length > 0;
    if (hasAnswers) {
      if (confirm("Es sind bereits Antworten vorhanden. Für ein neues Interview werden alle Antworten zurückgesetzt. Fortfahren?")) {
        setAInt({});
        setAGuest({});
      }
      // Bei „Abbrechen“ bleiben die bestehenden Antworten erhalten.
    } else {
      setAInt({});
      setAGuest({});
    }
    setScreen(mode === "guest" ? 4 : 3);
  };

  switch (screen) {
    case "archive": return <ArchiveScreen items={savedInterviews} onDelete={deleteInterview} onBack={() => setScreen(0)} />;
    case 0: return <StartScreen introText={introText} setIntroText={setIntroText} mode={mode} setMode={setMode} onNext={() => setScreen(1)} onReset={fullReset} onArchive={() => setScreen("archive")} archiveCount={savedInterviews.length} />;
    case 1: return <UploadScreen questions={questions} setQuestions={setQuestionsAndSelect} resetToDefault={resetToDefault} mode={mode} onNext={() => setScreen(2)} onBack={() => setScreen(0)} />;
    case 2: return <SetupScreen questions={questions} meta={meta} setMeta={setMeta} selected={selected} setSelected={setSelected} mode={mode} onNext={startInterview} onBack={() => setScreen(1)} />;
    case 3: return <AnswerScreen step={3} who="interviewer" subject="Interviewer" list={selectedList} answers={aInt} setAnswers={setAInt} mode={mode} onNext={() => setScreen(4)} onBack={() => setScreen(2)} />;
    case 4: return <AnswerScreen step={4} who="guest" subject={meta.guest} list={selectedList} answers={aGuest} setAnswers={setAGuest} mode={mode} onNext={() => setScreen(5)} onBack={() => setScreen(mode === "guest" ? 2 : 3)} />;
    case 5: return <CompareScreen list={selectedList} meta={meta} aInt={aInt} aGuest={aGuest} mode={mode} onRestart={newInterview} onBack={() => setScreen(4)} onSave={saveInterview} />;
    default: return null;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
